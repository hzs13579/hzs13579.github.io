[[items]]
title = "张家口100%可再生能源汇集与运行控制研究及示范"
subtitle = "清华大学"
date = "2023.04 - 2025.07"
content = """
在该项目中，我负责场站级主动支撑控制方案的建模与实现。

首先，提出了基于量测的升维映射全局线性化方法，将低维、强非线性过程映射为高维线性状态空间模型，形成了具有可解释性和可计算性的动态控制原型，以及面向功率跟踪和频率/电压支撑的模型—数据协同框架。

随后，将该原型扩展为考虑风速预测误差修正及确定性等价转化的随机模型预测控制方法，在目标函数中统一考虑并网侧功率波动、计划跟踪偏差、弃风和储能退化成本，并显式满足储能、桨距角和电网电压等工程约束，实现风储协同优化。

集群控制器的控制性能通过 RTDS 实时硬件在环仿真进行了验证。
"""
